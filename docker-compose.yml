version: "3.9"

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  app-net:
    driver: bridge

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  redis-data:

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── Node.js Application ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: runtime        # skips test stage for local dev speed
    image: nodejs-devops-app:local
    container_name: app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:    ${NODE_ENV:-development}
      PORT:        3000
      LOG_LEVEL:   ${LOG_LEVEL:-info}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      REDIS_URL:   redis://redis:6379
    env_file:
      - .env.local           # gitignored – holds real secrets in dev
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    # Expose only for local debugging – remove in production
    ports:
      - "6379:6379"
